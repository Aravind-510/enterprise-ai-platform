version: "3.9"

services:

  api:

    build: .

    ports:

      - "8000:8000"

    depends_on:

      - postgres

  postgres:

    image: postgres:16

    restart: always

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: password

      POSTGRES_DB: enterprise_ai

    ports:

      - "5432:5432"

  redis:

    image: redis:7

    ports:

      - "6379:6379"